# LUNAR TOFU 实验配置
# 用于复现 LUNAR 论文在 TOFU 数据集上的实验结果

# -----------------------------
# Model
# -----------------------------
model_family: llama2-7b-chat
base_model_path: ${oc.env:HOME}/.cache/modelscope/hub/models/modelscope/Llama-2-7b-chat-ms
model_path: ${base_model_path}

# -----------------------------
# Data
# -----------------------------
data_name: tofu_full
forget_edge: ['author_1']
use_different_retain_dataset: false
different_retain_set_path: dataset/unlearning/factual_data.json

# -----------------------------
# Unlearning knobs
# -----------------------------
layer_modified: [22]
coeff_list: [+2.0]
use_harmful: true
use_unverified: false
num_epochs: 20
lr: 0.01
positions: -1
n_train: 128
n_test: 100
n_val: 32
max_new_tokens: 64

# -----------------------------
# Evaluation
# -----------------------------
eval_batch_size: 4
eval_generation_max_length: 256
eval_generation_max_new_tokens: 128
if_eval_factual: true
factual_data_path: dataset/unlearning/factual_data.json
compute_es_score: false

# -----------------------------
# Save logging
# -----------------------------
save_unlearned_model: false
save_unlearned_model_path: models_lunar/${data_name}/${model_family}/${forget_edge}
save_folder: lunar_tofu
save_path: run_results/completions/${model_family}/${save_folder}/${data_name}