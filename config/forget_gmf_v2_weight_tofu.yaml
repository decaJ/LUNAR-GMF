# GMF v2 Weight Editing (SPWE) - TOFU configuration
#
# Subspace-Projected Weight Editing:
#   1. Compute forget-specific PCA subspace (forget PCA, retain directions removed)
#   2. Project this subspace out of down_proj and o_proj weights
#   3. Evaluate the permanently-edited model

# -----------------------------
# Model
# -----------------------------
model_family: llama2-7b
model_path: models_finetune/tofu_llama2_7b

# -----------------------------
# Data
# -----------------------------
data_name: tofu_full
forget_edge: ['author_1']
use_different_retain_dataset: false
different_retain_set_path: dataset/unlearning/factual_data.json

# -----------------------------
# Direction (only used for dataset loading helper)
# -----------------------------
use_harmful: true
use_unverified: false
positions: -1
n_train: 128
n_test: 100
n_val: 32
max_new_tokens: 64

# -----------------------------
# SPWE - Subspace
# -----------------------------
layer_modified: [19]     # which transformer layers to edit
pca_k: 5                 # forget PCA components
retain_pca_k: 10         # retain PCA components to suppress (overlap removal)

# -----------------------------
# SPWE - Erasure strength
# -----------------------------
lambda_erase: 0.5        # in [0,1]: 0=no effect, 1=full projection out
                         # start with 0.5; increase if forget not dropping enough
edit_down_proj: true     # project out from MLP down_proj (d_model, d_ffn)
edit_o_proj: true        # project out from attention o_proj (d_model, d_model)

# -----------------------------
# Evaluation
# -----------------------------
eval_batch_size: 4
eval_generation_max_length: 256
eval_generation_max_new_tokens: 128
if_eval_factual: true
factual_data_path: dataset/unlearning/factual_data.json

# -----------------------------
# Save / logging
# -----------------------------
save_unlearned_model: false
save_folder: gmf_v2_weight_tofu
save_path: run_results/completions/${model_family}/${save_folder}/${data_name}
