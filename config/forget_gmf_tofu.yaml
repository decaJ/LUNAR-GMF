# Gated Manifold Flow - TOFU Configuration
# Configuration for GMF unlearning experiments on TOFU dataset

# -----------------------------
# Model
# -----------------------------
model_family: llama2-7b
model_path: models_finetune/tofu_llama2_7b

# -----------------------------
# Data
# -----------------------------
data_name: tofu_full
forget_edge: ['author_1']
use_different_retain_dataset: false
different_retain_set_path: dataset/unlearning/factual_data.json

# -----------------------------
# Unlearning knobs
# -----------------------------
layer_modified: [19]
coeff_list: [+2.0]
use_harmful: true
use_unverified: false
num_epochs: 20
lr: 0.0001                    # Restored to 1e-4 for stable training
batch_size: 32
positions: -1
n_train: 128
n_test: 100
n_val: 32
max_new_tokens: 64

# -----------------------------
# GMF-specific parameters
# -----------------------------
sigma: 1.0                    # Gate bandwidth (with dimension normalization, sigma~1.0 is scale-invariant)
learnable_sigma: false       # Whether to learn sigma
distance_method: mahalanobis  # Distance metric: 'euclidean' or 'mahalanobis'
flow_hidden_dim: 512        # Hidden dimension of flow transformation
flow_num_layers: 3          # Number of layers in flow MLP (restored to 3 for stability)
attractor_scale: 1.0        # Scale for attractor manifold

# Loss weights
lambda_attractor: 2.0
lambda_retain: 1.0          # Restored to 1.0 for strong retain protection
lambda_flow: 0.1            # Restored to 0.1 to prevent space distortion
lambda_recoverability: 0.1

# -----------------------------
# Evaluation
# -----------------------------
eval_batch_size: 4
eval_generation_max_length: 256
eval_generation_max_new_tokens: 128
if_eval_factual: true
factual_data_path: dataset/unlearning/factual_data.json
compute_es_score: false

# -----------------------------
# Save logging
# -----------------------------
save_unlearned_model: false
save_unlearned_model_path: models_gmf/${data_name}/${model_family}/${forget_edge}/${lambda_attractor}
save_folder: gmf_tofu
save_path: run_results/completions/${model_family}/${save_folder}/${data_name}/${lambda_attractor}