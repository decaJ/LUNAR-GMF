# -----------------------------
# Controlled Region-to-Attractor Transport Configuration
# -----------------------------
# Method: Controlled Region-to-Attractor Transport for LLM Unlearning
# 
# Core concepts:
# - Recoverability Region: R_f^{(l)} = { a : r^{(l)}(a) >= tau_f }
# - Abstention Attractor: A^{(l)} = { a : s^{(l)}(a) >= tau_a }
# - Energy Function: E^{(l)}(a) = φ_r(r) + λ_a * φ_a(s) + λ_d * φ_d(a, a_base)
# - Control Law: u_l(a) = -η_l * ∇_a E^{(l)}(a)
# -----------------------------

# -----------------------------
# Model Configuration
# -----------------------------
model_family: llama2-7b-chat
model_path: /HDD/users/yanzeyu/LUNAR/models_finetune/tofu_llama2_7b

# -----------------------------
# Data Configuration
# -----------------------------
data_name: tofu_full
forget_edge: ['author_1']
use_different_retain_dataset: false
different_retain_set_path: dataset/unlearning/factual_data.json

# -----------------------------
# Target Layers
# -----------------------------
steering_layers: [18, 19, 21]

# -----------------------------
# Activation Extraction
# -----------------------------
activation_batch_size: 4
activation_positions: -1

# -----------------------------
# Recoverability Probe Configuration
# -----------------------------
# Defines R_f^{(l)} = { a : r^{(l)}(a) >= tau_f }
probe_hidden_dim: 256
probe_num_layers: 3
probe_epochs: 50
probe_lr: 0.001
probe_batch_size: 32
probe_val_split: 0.2
probe_patience: 10
probe_weight_decay: 0.01
probe_dropout: 0.1

# -----------------------------
# Attractor Set Configuration
# -----------------------------
# Defines A^{(l)} = { a : s^{(l)}(a) >= tau_a }
attractor_subspace_dim: 16
attractor_percentile: 0.80
attractor_min_samples: 10

# -----------------------------
# Transport Controller Configuration
# -----------------------------
# Energy Function: E^{(l)}(a) = φ_r(r) + λ_a * φ_a(s) + λ_d * φ_d(a, a_base)
# Control Law: u_l(a) = -η_l * ∇_a E^{(l)}(a)

# Transport parameters
num_transport_steps: 5
transport_step_size: 0.1

# Energy function weights
lambda_recoverability: 1.0  # Weight for recoverability penalty φ_r
lambda_attractor: 0.5       # Weight for attractor reward φ_a
lambda_drift: 2.0           # Weight for retain drift penalty φ_d

# Thresholds
recoverability_threshold: 0.5  # τ_f for recoverability region
control_norm_clip: 1.0         # Maximum control signal norm

# Attractor selection
primary_attractor: ignorance  # "ignorance", "refusal", or "combined"

# Controller training
trainable_controller: false

# -----------------------------
# Evaluation Configuration
# -----------------------------
eval_batch_size: 4
eval_generation_max_length: 256
eval_generation_max_new_tokens: 128
compute_es_score: true

# -----------------------------
# Reference Data Paths
# -----------------------------
ignorance_reference_path: dataset/splits/unverified.json
refusal_reference_path: dataset/splits/harmful.json

# -----------------------------
# Save Configuration
# -----------------------------
save_dir: outputs/dynamics_unlearn
force_retrain: false

# -----------------------------
# Advanced Options
# -----------------------------
# Penalty function types
recoverability_penalty_type: quadratic  # "quadratic", "exp", "linear", "threshold"
attractor_reward_type: distance         # "distance", "exp", "linear"
drift_penalty_type: quadratic           # "quadratic", "cosine", "linear"

# Temperature parameters
temperature_recoverability: 1.0
temperature_attractor: 1.0